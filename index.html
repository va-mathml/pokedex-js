<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex | va-mathml</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header>
      <img src="https://raw.githubusercontent.com/PokeAPI/media/master/logo/pokeapi_256.png" alt="PokéAPI logo" />
      <h1>Pokédex</h1>
      <p>Explore the first 150 Pokémon</p>
    </header>

    <!-- CONTROLS -->
    <div class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by name..."
      />
      <select id="typeFilter">
        <option value="all">All types</option>
      </select>
    </div>

    <!-- SPINNER -->
    <div id="spinner" class="spinner-wrap">
      <div class="pokeball-spinner"></div>
      <p>Loading Pokémon...</p>
    </div>

    <!-- GRID DE CARDS -->
    <main id="pokemonGrid" class="pokemon-grid"></main>

    <!-- MODAL -->
    <div id="modal" class="modal-overlay hidden">
      <div class="modal-box">
        <button id="closeModal">X</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <footer>
      <p>Built with Vanilla JS · <a href="https://pokeapi.co" target="_blank">PokéAPI</a> · <a href="https://github.com/va-mathml/pokedex-js" target="_blank">GitHub</a> · Victor Aguilar</p>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
